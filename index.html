
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Restudio Calender</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Tiny5&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.30.0/dist/tabler-icons.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/air-datepicker@3.5.3/air-datepicker.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Roboto', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #1e1e1e;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            color: #cccccc;
        }

        /* ===== TOP BAR ===== */
        .top-bar {
            width: 100%;
            background-color: #000;
            color: #fff;
            height: 60px;
            display: flex;
            align-items: center;
            padding: 0 20px;
            box-sizing: border-box;
            flex-shrink: 0;
            border-bottom: 1px solid #2a2a2a;
        }

        .top-bar img {
            height: 40px;
            width: auto;
            margin-right: 12px;
        }

        .top-bar-title {
            font-family: "Tiny5", system-ui, sans-serif;
            font-size: 28px;
            letter-spacing: 1px;
            color: #ffffff;
        }

        /* ===== CALENDAR CONTAINER ===== */
        .container {
            max-width: 820px;
            width: 100%;
            padding: 20px;
        }

        .view-toggle {
            display: flex;
            gap: 6px;
            background: #252526;
            padding: 6px;
            border-radius: 12px;
            margin-bottom: 16px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.4);
        }

        .view-toggle button {
            flex: 1;
            min-width: 60px;
            padding: 8px 12px;
            border: none;
            border-radius: 8px;
            font-family: 'Roboto', sans-serif;
            font-weight: 500;
            font-size: 0.85rem;
            cursor: pointer;
            transition: 0.2s;
            background: transparent;
            color: #aaa;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }

        .view-toggle button:hover {
            background: #2d2d2d;
            color: #cccccc;
        }

        .view-toggle button.active {
            background: #094771;
            color: #ffffff;
        }

        .view-toggle button.active:hover {
            background: #1177bb;
        }

        .view-toggle button i {
            font-size: 1rem;
        }

        .calendar-wrapper {
            background: #252526;
            border-radius: 16px;
            padding: 24px;
            width: 100%;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.4);
            margin-bottom: 16px;
            border: 1px solid #3a3a3a;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 8px;
        }

        .month-year {
            font-size: 1.25rem;
            font-weight: 700;
            color: #e0e0e0;
        }

        .nav {
            display: flex;
            gap: 4px;
            align-items: center;
        }

        .nav button {
            background: #2d2d2d;
            border: 1px solid #3a3a3a;
            padding: 6px 10px;
            border-radius: 8px;
            font-size: 1.1rem;
            cursor: pointer;
            transition: 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 36px;
            height: 36px;
            color: #cccccc;
        }

        .nav button:hover {
            background: #3a3a3a;
            border-color: #4a4a4a;
        }

        .nav button i {
            font-size: 1.2rem;
        }

        .nav #todayBtn {
            width: auto;
            padding: 6px 14px;
            font-size: 0.75rem;
            font-weight: 500;
            background: #094771;
            color: #ffffff;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            font-family: 'Roboto', sans-serif;
        }

        .nav #todayBtn:hover {
            background: #1177bb;
        }

        .weekdays {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            text-align: center;
            font-size: 0.75rem;
            font-weight: 500;
            color: #aaa;
            letter-spacing: 0.3px;
            margin-bottom: 8px;
            text-transform: uppercase;
        }

        .days-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 4px;
        }

        .day-cell {
            aspect-ratio: 1 / 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-size: 0.95rem;
            font-weight: 500;
            background: #2b2b2b;
            border-radius: 10px;
            color: #cccccc;
            cursor: pointer;
            transition: 0.15s;
            position: relative;
            padding: 2px;
            border: 1px solid transparent;
        }

        .day-cell:hover {
            background: #3a3a3a;
            border-color: #4a4a4a;
        }

        .day-cell.empty {
            color: #555;
            background: transparent;
            cursor: default;
            border-color: transparent;
        }

        .day-cell.empty:hover {
            background: transparent;
            border-color: transparent;
        }

        .day-cell.today {
            background: #094771;
            color: #ffffff;
            font-weight: 700;
            border-color: #1177bb;
        }

        .day-cell.today:hover {
            background: #1177bb;
        }

        .day-cell .event-dot {
            width: 5px;
            height: 5px;
            background: #a53a3a;
            border-radius: 50%;
            margin-top: 2px;
        }

        .day-cell.today .event-dot {
            background: #ffffff;
        }

        .day-cell .event-count {
            position: absolute;
            top: 2px;
            right: 5px;
            font-size: 0.5rem;
            font-weight: 700;
            color: #a53a3a;
        }

        .day-cell.today .event-count {
            color: #ffffff;
        }

        .week-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 6px;
        }

        .week-day {
            background: #2b2b2b;
            border-radius: 10px;
            padding: 10px 6px;
            min-height: 140px;
            cursor: pointer;
            transition: 0.15s;
            border: 1px solid #3a3a3a;
        }

        .week-day:hover {
            background: #3a3a3a;
            border-color: #4a4a4a;
        }

        .week-day .week-day-label {
            text-align: center;
            font-size: 0.7rem;
            font-weight: 500;
            color: #aaa;
            text-transform: uppercase;
            margin-bottom: 4px;
        }

        .week-day .week-day-number {
            text-align: center;
            font-size: 1.1rem;
            font-weight: 500;
            color: #cccccc;
            margin-bottom: 6px;
        }

        .week-day .week-day-number.today {
            color: #4c9aff;
        }

        .week-day .week-event {
            font-size: 0.65rem;
            background: #094771;
            color: #ffffff;
            padding: 2px 6px;
            border-radius: 4px;
            margin-bottom: 2px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            font-weight: 400;
        }

        .week-day .week-event.more {
            background: #2d2d2d;
            color: #aaa;
            font-weight: 500;
            border: 1px solid #3a3a3a;
        }

        .day-view-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-bottom: 2px solid #2d2d2d;
            margin-bottom: 16px;
            flex-wrap: wrap;
            gap: 8px;
        }

        .day-view-header .date-display {
            font-size: 1.1rem;
            font-weight: 500;
            color: #e0e0e0;
        }

        .day-view-header .day-name {
            font-size: 0.9rem;
            color: #aaa;
        }

        .day-view-header .event-count-badge {
            font-size: 0.8rem;
            background: #2d2d2d;
            padding: 4px 12px;
            border-radius: 20px;
            color: #cccccc;
        }

        .day-events-list {
            padding: 8px 0;
        }

        .day-events-list .event-item {
            padding: 12px 16px;
            background: #2b2b2b;
            border-radius: 10px;
            margin-bottom: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid #3a3a3a;
        }

        .day-events-list .no-events {
            padding: 30px 0;
            text-align: center;
            color: #555;
        }

        .year-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 16px;
        }

        .year-month {
            background: #2b2b2b;
            border-radius: 10px;
            padding: 12px;
            border: 1px solid #3a3a3a;
        }

        .year-month .year-month-label {
            font-size: 0.85rem;
            font-weight: 700;
            color: #e0e0e0;
            text-align: center;
            margin-bottom: 8px;
        }

        .year-month .year-month-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 2px;
        }

        .year-month .year-day {
            text-align: center;
            font-size: 0.6rem;
            padding: 3px 0;
            border-radius: 4px;
            color: #cccccc;
        }

        .year-month .year-day.empty {
            color: #555;
        }

        .year-month .year-day.has-event {
            background: #094771;
            color: #ffffff;
            font-weight: 500;
        }

        .year-month .year-day.today {
            background: #1177bb;
            color: #ffffff;
            font-weight: 700;
        }

        .year-month .year-day.weekend {
            color: #a53a3a;
        }

        .year-month .year-day.has-event.weekend {
            background: #a53a3a;
            color: #ffffff;
        }

        .year-month .year-day.today.weekend {
            background: #1177bb;
            color: #ffffff;
        }

        .view-hidden {
            display: none !important;
        }

        .event-form {
            background: #252526;
            border-radius: 16px;
            padding: 20px 24px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.4);
            border: 1px solid #3a3a3a;
        }

        .event-form h3 {
            font-weight: 700;
            font-size: 1rem;
            margin-bottom: 14px;
            color: #e0e0e0;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .event-form h3 i {
            font-size: 1.2rem;
            color: #4c9aff;
        }

        .form-row {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            align-items: center;
        }

        .form-row input {
            flex: 1;
            min-width: 140px;
            padding: 10px 14px;
            border: 1.5px solid #3a3a3a;
            border-radius: 10px;
            font-family: 'Roboto', sans-serif;
            font-size: 0.9rem;
            outline: none;
            transition: 0.2s;
            background: #2b2b2b;
            color: #e0e0e0;
            cursor: pointer;
        }

        .form-row input:focus {
            border-color: #4c9aff;
            background: #2d2d2d;
        }

        .form-row input::placeholder {
            color: #555;
        }

        .form-row input#eventDateInput {
            background: #2b2b2b;
            color: #e0e0e0;
            cursor: pointer;
            position: relative;
        }

        .form-row input#eventDateInput:hover {
            border-color: #4a4a4a;
            background: #2d2d2d;
        }

        .form-row button {
            background: #094771;
            color: #ffffff;
            border: none;
            padding: 10px 20px;
            border-radius: 10px;
            font-family: 'Roboto', sans-serif;
            font-weight: 500;
            font-size: 0.9rem;
            cursor: pointer;
            transition: 0.2s;
            display: flex;
            align-items: center;
            gap: 6px;
            white-space: nowrap;
        }

        .form-row button:hover {
            background: #1177bb;
        }

        .form-row button i {
            font-size: 1rem;
        }

        .event-list {
            margin-top: 14px;
            padding-top: 14px;
            border-top: 1.5px solid #2d2d2d;
            max-height: 200px;
            overflow-y: auto;
        }

        .event-list::-webkit-scrollbar {
            width: 4px;
        }

        .event-list::-webkit-scrollbar-track {
            background: #2b2b2b;
            border-radius: 4px;
        }

        .event-list::-webkit-scrollbar-thumb {
            background: #3a3a3a;
            border-radius: 4px;
        }

        .event-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 4px;
            font-size: 0.9rem;
            border-bottom: 1px solid #2d2d2d;
        }

        .event-item:last-child {
            border-bottom: none;
        }

        .event-item .event-text {
            display: flex;
            align-items: center;
            gap: 8px;
            color: #cccccc;
        }

        .event-item .event-text i {
            font-size: 0.6rem;
            color: #a53a3a;
        }

        .event-item .delete-btn {
            background: none;
            border: none;
            color: #555;
            cursor: pointer;
            padding: 4px 6px;
            transition: 0.2s;
            display: flex;
            align-items: center;
            border-radius: 6px;
        }

        .event-item .delete-btn:hover {
            color: #a53a3a;
            background: #2d2d2d;
        }

        .event-item .delete-btn i {
            font-size: 1rem;
        }

        .no-events-msg {
            color: #555;
            font-size: 0.85rem;
            text-align: center;
            padding: 16px 0;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }

        .no-events-msg i {
            font-size: 1.1rem;
        }

        .footer {
            text-align: center;
            margin-top: 16px;
            font-size: 0.7rem;
            color: #555;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }

        .footer i {
            color: #4c9aff;
        }

        .selected-date-label {
            font-size: 0.75rem;
            font-weight: 500;
            color: #aaa;
            margin-bottom: 6px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .selected-date-label i {
            color: #4c9aff;
        }

        /* Air Datepicker Dark Theme */
        .air-datepicker {
            font-family: 'Roboto', sans-serif !important;
            border-radius: 12px !important;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.8) !important;
            border: 1px solid #3a3a3a !important;
            background: #252526 !important;
            color: #cccccc !important;
            padding: 8px !important;
        }

        .air-datepicker-nav {
            background: #2b2b2b !important;
            border-bottom: 1px solid #3a3a3a !important;
            padding: 8px 12px !important;
            border-radius: 8px 8px 0 0 !important;
        }

        .air-datepicker-nav--title {
            color: #e0e0e0 !important;
            font-weight: 700 !important;
        }

        .air-datepicker-nav--action {
            color: #aaa !important;
        }

        .air-datepicker-nav--action:hover {
            background: #3a3a3a !important;
            border-radius: 6px !important;
        }

        .air-datepicker-body--day-name {
            color: #aaa !important;
            font-weight: 500 !important;
            font-size: 0.7rem !important;
            text-transform: uppercase !important;
            padding: 4px 0 !important;
        }

        .air-datepicker-cell {
            color: #cccccc !important;
            border-radius: 8px !important;
            font-size: 0.85rem !important;
        }

        .air-datepicker-cell:hover {
            background: #3a3a3a !important;
        }

        .air-datepicker-cell.-selected- {
            background: #094771 !important;
            color: #ffffff !important;
        }

        .air-datepicker-cell.-selected-.-current- {
            background: #1177bb !important;
            color: #ffffff !important;
        }

        .air-datepicker-cell.-current- {
            color: #4c9aff !important;
        }

        .air-datepicker-cell.-weekend- {
            color: #a53a3a !important;
        }

        .air-datepicker-cell.-selected-.-weekend- {
            color: #ffffff !important;
        }

        .air-datepicker-cell.-disabled- {
            color: #555 !important;
        }

        .air-datepicker--pointer {
            display: none !important;
        }

        .air-datepicker-event-dot {
            display: block;
            width: 5px;
            height: 5px;
            background: #a53a3a;
            border-radius: 50%;
            margin: 3px auto 0;
        }

        .air-datepicker-cell.-selected- .air-datepicker-event-dot {
            background: #ffffff;
        }

        .air-datepicker-footer {
            border-top: 1px solid #3a3a3a !important;
            padding: 8px 12px !important;
        }

        .air-datepicker-footer .air-datepicker-btn {
            color: #4c9aff !important;
            font-weight: 500 !important;
        }

        .air-datepicker-footer .air-datepicker-btn:hover {
            color: #1177bb !important;
            background: #2d2d2d !important;
            border-radius: 6px !important;
        }

        @media (max-width: 700px) {
            .year-grid {
                grid-template-columns: repeat(3, 1fr);
                gap: 10px;
            }
        }

        @media (max-width: 600px) {
            .view-toggle button {
                font-size: 0.7rem;
                padding: 6px 8px;
                min-width: 45px;
            }
            .view-toggle button i {
                font-size: 0.8rem;
            }
            .year-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 10px;
            }
            .week-grid {
                gap: 4px;
            }
            .week-day {
                min-height: 100px;
                padding: 6px 4px;
            }
            .week-day .week-event {
                font-size: 0.55rem;
            }
            .calendar-wrapper,
            .event-form {
                padding: 16px;
            }
            .month-year {
                font-size: 1.1rem;
            }
            .day-cell {
                font-size: 0.85rem;
            }
            .form-row input {
                min-width: 100px;
                font-size: 0.85rem;
                padding: 8px 12px;
            }
            .form-row button {
                padding: 8px 14px;
                font-size: 0.85rem;
            }
            .header {
                flex-direction: column;
                align-items: stretch;
                gap: 10px;
            }
            .nav {
                justify-content: center;
                flex-wrap: wrap;
            }
            .day-view-header {
                flex-direction: column;
                align-items: flex-start;
            }
        }

        @media (max-width: 400px) {
            .year-grid {
                grid-template-columns: 1fr 1fr;
                gap: 8px;
            }
            .week-grid {
                gap: 2px;
            }
            .week-day {
                min-height: 80px;
                padding: 4px 2px;
            }
            .week-day .week-day-number {
                font-size: 0.8rem;
            }
            .week-day .week-event {
                font-size: 0.5rem;
                padding: 1px 4px;
            }
            .view-toggle button {
                font-size: 0.6rem;
                padding: 4px 6px;
                min-width: 35px;
            }
            .view-toggle button i {
                font-size: 0.7rem;
            }
        }
    </style>
</head>
<body>

    <!-- ===== TOP BAR ===== -->
    <div class="top-bar">
        <img src="https://i.postimg.cc/LXvCQ5rt/swrh-restudio.png" alt="Logo">
        <span class="top-bar-title">Calender</span>
    </div>

    <!-- ===== MAIN CALENDAR ===== -->
    <div class="container">
        <div class="view-toggle">
            <button class="active" data-view="day"><i class="ti ti-calendar-day"></i> Day</button>
            <button data-view="week"><i class="ti ti-calendar-week"></i> Week</button>
            <button data-view="month"><i class="ti ti-calendar-month"></i> Month</button>
            <button data-view="year"><i class="ti ti-calendar-stats"></i> Year</button>
        </div>

        <div class="calendar-wrapper" id="calendarContainer">
            <div class="header">
                <span class="month-year" id="monthYearDisplay">May 2026</span>
                <div class="nav">
                    <button id="prevBtn"><i class="ti ti-chevron-left"></i></button>
                    <button id="nextBtn"><i class="ti ti-chevron-right"></i></button>
                    <button id="todayBtn">Today</button>
                </div>
            </div>

            <div id="monthView">
                <div class="weekdays">
                    <span>Su</span><span>Mo</span><span>Tu</span><span>We</span><span>Th</span><span>Fr</span><span>Sa</span>
                </div>
                <div class="days-grid" id="daysGrid"></div>
            </div>

            <div id="weekView" class="view-hidden">
                <div class="week-grid" id="weekGrid"></div>
            </div>

            <div id="dayView" class="view-hidden">
                <div class="day-view-header">
                    <div>
                        <div class="day-name" id="dayViewDayName">Monday</div>
                        <div class="date-display" id="dayViewDate">May 15, 2026</div>
                    </div>
                    <div class="event-count-badge" id="dayViewEventCount">0 events</div>
                </div>
                <div class="day-events-list" id="dayEventsList">
                    <div class="no-events"><i class="ti ti-calendar-off"></i> No events on this day</div>
                </div>
            </div>

            <div id="yearView" class="view-hidden">
                <div class="year-grid" id="yearGrid"></div>
            </div>
        </div>

        <div class="event-form">
            <h3><i class="ti ti-calendar-plus"></i> Add Event</h3>
            <div class="form-row">
                <input type="text" id="eventDateInput" placeholder="📅 Select date..." readonly>
                <input type="text" id="eventTextInput" placeholder="Event name..." maxlength="30">
                <button id="addEventBtn"><i class="ti ti-plus"></i> Add</button>
            </div>
            <div class="event-list" id="eventList">
                <div class="no-events-msg"><i class="ti ti-calendar-off"></i> No events yet</div>
            </div>
        </div>

        <div class="footer">
            <i class="ti ti-brand-tabler"></i> © 2026 Restudio software laboratories. All rights reserved.
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/air-datepicker@3.5.3/air-datepicker.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/air-datepicker@3.5.3/locale/en.js"></script>
    <script>
        (function() {
            let currentView = 'day';
            let currentDate = new Date();
            let currentYear = currentDate.getFullYear();
            let currentMonth = currentDate.getMonth();
            let currentDay = currentDate.getDate();

            let weekStartDate = new Date(currentDate);
            weekStartDate.setDate(currentDate.getDate() - currentDate.getDay());

            const today = new Date();
            const todayDate = today.getDate();
            const todayMonth = today.getMonth();
            const todayYear = today.getFullYear();

            const monthNames = [
                'January', 'February', 'March', 'April',
                'May', 'June', 'July', 'August',
                'September', 'October', 'November', 'December'
            ];
            const dayNames = ['Sunday', 'Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday'];
            const shortDayNames = ['Su', 'Mo', 'Tu', 'We', 'Th', 'Fr', 'Sa'];

            let events = {};

            function loadEvents() {
                const stored = localStorage.getItem('calendar_events');
                if (stored) {
                    try {
                        events = JSON.parse(stored);
                    } catch (e) {
                        events = {};
                    }
                }
            }

            function saveEvents() {
                localStorage.setItem('calendar_events', JSON.stringify(events));
            }

            function getDateKey(date) {
                const y = date.getFullYear();
                const m = String(date.getMonth() + 1).padStart(2, '0');
                const d = String(date.getDate()).padStart(2, '0');
                return `${y}-${m}-${d}`;
            }

            function getEventsForDate(date) {
                const key = getDateKey(date);
                return events[key] || [];
            }

            function addEvent(date, text) {
                if (!text.trim()) return false;
                const key = getDateKey(date);
                if (!events[key]) {
                    events[key] = [];
                }
                events[key].push(text.trim());
                saveEvents();
                renderView();
                if (datepicker) {
                    datepicker.update();
                }
                return true;
            }

            function deleteEvent(date, index) {
                const key = getDateKey(date);
                if (events[key]) {
                    events[key].splice(index, 1);
                    if (events[key].length === 0) {
                        delete events[key];
                    }
                    saveEvents();
                    renderView();
                    if (datepicker) {
                        datepicker.update();
                    }
                }
            }

            function isSameDay(d1, d2) {
                return d1.getFullYear() === d2.getFullYear() &&
                    d1.getMonth() === d2.getMonth() &&
                    d1.getDate() === d2.getDate();
            }

            function addDays(date, days) {
                const result = new Date(date);
                result.setDate(result.getDate() + days);
                return result;
            }

            function addWeeks(date, weeks) {
                return addDays(date, weeks * 7);
            }

            function startOfWeek(date) {
                const result = new Date(date);
                result.setDate(result.getDate() - result.getDay());
                return result;
            }

            function formatDate(date) {
                return `${monthNames[date.getMonth()]} ${date.getDate()}, ${date.getFullYear()}`;
            }

            function formatDateShort(date) {
                return `${monthNames[date.getMonth()]} ${date.getDate()}`;
            }

            function renderMonthView(year, month) {
                const grid = document.getElementById('daysGrid');
                const firstDay = new Date(year, month, 1);
                const daysInMonth = new Date(year, month + 1, 0).getDate();
                let startDay = firstDay.getDay();
                const prevMonthDays = new Date(year, month, 0).getDate();
                const totalCells = 42;
                let html = '';

                for (let i = 0; i < totalCells; i++) {
                    let d, isCurrentMonth = true;
                    let dayNumber, dayMonth = month,
                        dayYear = year;

                    if (i < startDay) {
                        dayNumber = prevMonthDays - startDay + i + 1;
                        isCurrentMonth = false;
                        dayMonth = month - 1;
                        if (dayMonth < 0) { dayMonth = 11;
                            dayYear = year - 1; }
                    } else if (i >= startDay + daysInMonth) {
                        dayNumber = i - (startDay + daysInMonth) + 1;
                        isCurrentMonth = false;
                        dayMonth = month + 1;
                        if (dayMonth > 11) { dayMonth = 0;
                            dayYear = year + 1; }
                    } else {
                        dayNumber = i - startDay + 1;
                    }

                    d = new Date(dayYear, dayMonth, dayNumber);
                    const isToday = isSameDay(d, today);
                    const dayEvents = getEventsForDate(d);
                    const hasEvent = dayEvents.length > 0;

                    let classes = 'day-cell';
                    if (!isCurrentMonth) classes += ' empty';
                    if (isToday) classes += ' today';

                    html += `<div class="${classes}" data-year="${dayYear}" data-month="${dayMonth}" data-day="${dayNumber}">
                        <span>${dayNumber}</span>`;
                    if (hasEvent && isCurrentMonth) {
                        html += `<div class="event-dot"></div>`;
                        if (dayEvents.length > 1) {
                            html += `<span class="event-count">${dayEvents.length}</span>`;
                        }
                    }
                    html += `</div>`;
                }

                grid.innerHTML = html;

                grid.querySelectorAll('.day-cell:not(.empty)').forEach(cell => {
                    cell.addEventListener('click', function() {
                        const year = parseInt(this.dataset.year);
                        const month = parseInt(this.dataset.month);
                        const day = parseInt(this.dataset.day);
                        currentDate = new Date(year, month, day);
                        currentYear = year;
                        currentMonth = month;
                        currentDay = day;
                        switchView('day');
                    });
                });
            }

            function renderWeekView(startDate) {
                const grid = document.getElementById('weekGrid');
                let html = '';
                const weekStart = new Date(startDate);

                for (let i = 0; i < 7; i++) {
                    const d = new Date(weekStart);
                    d.setDate(weekStart.getDate() + i);
                    const isToday = isSameDay(d, today);
                    const dayEvents = getEventsForDate(d);

                    html += `<div class="week-day" data-year="${d.getFullYear()}" data-month="${d.getMonth()}" data-day="${d.getDate()}">
                        <div class="week-day-label">${shortDayNames[i]}</div>
                        <div class="week-day-number${isToday ? ' today' : ''}">${d.getDate()}</div>`;

                    const maxDisplay = 3;
                    const displayEvents = dayEvents.slice(0, maxDisplay);
                    displayEvents.forEach(text => {
                        html += `<div class="week-event">${text}</div>`;
                    });
                    if (dayEvents.length > maxDisplay) {
                        html += `<div class="week-event more">+${dayEvents.length - maxDisplay} more</div>`;
                    }

                    html += `</div>`;
                }

                grid.innerHTML = html;

                grid.querySelectorAll('.week-day').forEach(el => {
                    el.addEventListener('click', function() {
                        const year = parseInt(this.dataset.year);
                        const month = parseInt(this.dataset.month);
                        const day = parseInt(this.dataset.day);
                        currentDate = new Date(year, month, day);
                        currentYear = year;
                        currentMonth = month;
                        currentDay = day;
                        switchView('day');
                    });
                });
            }

            function renderDayView(date) {
                document.getElementById('dayViewDayName').textContent = dayNames[date.getDay()];
                document.getElementById('dayViewDate').textContent = formatDate(date);

                const dayEvents = getEventsForDate(date);
                document.getElementById('dayViewEventCount').textContent = `${dayEvents.length} events`;

                const list = document.getElementById('dayEventsList');
                if (dayEvents.length === 0) {
                    list.innerHTML = `<div class="no-events"><i class="ti ti-calendar-off"></i> No events on this day</div>`;
                } else {
                    let html = '';
                    dayEvents.forEach((text, index) => {
                        html += `
                            <div class="event-item">
                                <span class="event-text">
                                    <i class="ti ti-circle-filled"></i>
                                    ${text}
                                </span>
                                <button class="delete-btn" data-index="${index}">
                                    <i class="ti ti-x"></i>
                                </button>
                            </div>
                        `;
                    });
                    list.innerHTML = html;

                    list.querySelectorAll('.delete-btn').forEach(btn => {
                        btn.addEventListener('click', function() {
                            const idx = parseInt(this.dataset.index);
                            deleteEvent(date, idx);
                        });
                    });
                }

                renderEventList(date);
            }

            function renderYearView(year) {
                const grid = document.getElementById('yearGrid');
                let html = '';

                for (let m = 0; m < 12; m++) {
                    const daysInMonth = new Date(year, m + 1, 0).getDate();
                    const firstDay = new Date(year, m, 1).getDay();

                    html += `<div class="year-month">
                        <div class="year-month-label">${monthNames[m]}</div>
                        <div class="year-month-grid">`;

                    for (let i = 0; i < firstDay; i++) {
                        html += `<div class="year-day empty"></div>`;
                    }

                    for (let d = 1; d <= daysInMonth; d++) {
                        const dateObj = new Date(year, m, d);
                        const isToday = isSameDay(dateObj, today);
                        const dayEvents = getEventsForDate(dateObj);
                        const hasEvent = dayEvents.length > 0;
                        const isWeekend = dateObj.getDay() === 0 || dateObj.getDay() === 6;

                        let classes = 'year-day';
                        if (isToday) classes += ' today';
                        if (hasEvent) classes += ' has-event';
                        if (isWeekend && !hasEvent && !isToday) classes += ' weekend';

                        html += `<div class="${classes}">${d}</div>`;
                    }

                    html += `</div></div>`;
                }

                grid.innerHTML = html;
            }

            function renderEventList(date) {
                const eventList = document.getElementById('eventList');

                if (date) {
                    const dayEvents = getEventsForDate(date);
                    if (dayEvents.length === 0) {
                        eventList.innerHTML = `
                            <div class="no-events-msg">
                                <i class="ti ti-calendar-off"></i>
                                No events on ${formatDate(date)}
                            </div>
                        `;
                        return;
                    }

                    let html = `
                        <div class="selected-date-label">
                            <i class="ti ti-calendar-event"></i> ${formatDate(date)}
                        </div>
                    `;
                    dayEvents.forEach((text, index) => {
                        html += `
                            <div class="event-item">
                                <span class="event-text">
                                    <i class="ti ti-circle-filled"></i>
                                    ${text}
                                </span>
                                <button class="delete-btn" data-index="${index}">
                                    <i class="ti ti-x"></i>
                                </button>
                            </div>
                        `;
                    });
                    eventList.innerHTML = html;

                    eventList.querySelectorAll('.delete-btn').forEach(btn => {
                        btn.addEventListener('click', function() {
                            const idx = parseInt(this.dataset.index);
                            deleteEvent(date, idx);
                        });
                    });
                } else {
                    const allKeys = Object.keys(events);
                    if (allKeys.length === 0) {
                        eventList.innerHTML = `
                            <div class="no-events-msg">
                                <i class="ti ti-calendar-off"></i>
                                No events yet
                            </div>
                        `;
                        return;
                    }

                    allKeys.sort();
                    let html = `<div class="selected-date-label"><i class="ti ti-list"></i> All Events</div>`;
                    allKeys.forEach(key => {
                        const parts = key.split('-').map(Number);
                        const d = new Date(parts[0], parts[1] - 1, parts[2]);
                        const dayEvents = events[key];
                        if (dayEvents.length > 0) {
                            html += `<div style="font-size:0.75rem;color:#aaa;margin-top:8px;margin-bottom:2px;">
                                <i class="ti ti-calendar-dot"></i> ${formatDate(d)}
                            </div>`;
                            dayEvents.forEach((text, index) => {
                                html += `
                                    <div class="event-item">
                                        <span class="event-text">
                                            <i class="ti ti-circle-filled" style="font-size:0.5rem;"></i>
                                            ${text}
                                        </span>
                                        <button class="delete-btn" data-key="${key}" data-index="${index}">
                                            <i class="ti ti-x"></i>
                                        </button>
                                    </div>
                                `;
                            });
                        }
                    });

                    if (html === `<div class="selected-date-label"><i class="ti ti-list"></i> All Events</div>`) {
                        html = `<div class="no-events-msg"><i class="ti ti-calendar-off"></i> No events yet</div>`;
                    }
                    eventList.innerHTML = html;

                    eventList.querySelectorAll('.delete-btn').forEach(btn => {
                        btn.addEventListener('click', function() {
                            const key = this.dataset.key;
                            const idx = parseInt(this.dataset.index);
                            const parts = key.split('-').map(Number);
                            const d = new Date(parts[0], parts[1] - 1, parts[2]);
                            deleteEvent(d, idx);
                        });
                    });
                }
            }

            function switchView(view) {
                currentView = view;

                document.querySelectorAll('.view-toggle button').forEach(btn => {
                    btn.classList.toggle('active', btn.dataset.view === view);
                });

                document.getElementById('monthView').classList.add('view-hidden');
                document.getElementById('weekView').classList.add('view-hidden');
                document.getElementById('dayView').classList.add('view-hidden');
                document.getElementById('yearView').classList.add('view-hidden');

                const viewMap = {
                    'month': 'monthView',
                    'week': 'weekView',
                    'day': 'dayView',
                    'year': 'yearView'
                };
                document.getElementById(viewMap[view]).classList.remove('view-hidden');

                updateHeader();
                renderView();
            }

            function renderView() {
                if (currentView === 'month') {
                    renderMonthView(currentYear, currentMonth);
                } else if (currentView === 'week') {
                    renderWeekView(weekStartDate);
                } else if (currentView === 'day') {
                    renderDayView(currentDate);
                } else if (currentView === 'year') {
                    renderYearView(currentYear);
                }
                if (currentView !== 'day') {
                    renderEventList();
                }
            }

            function updateHeader() {
                if (currentView === 'day') {
                    document.getElementById('monthYearDisplay').textContent = formatDate(currentDate);
                } else if (currentView === 'week') {
                    const weekEnd = new Date(weekStartDate);
                    weekEnd.setDate(weekStartDate.getDate() + 6);
                    document.getElementById('monthYearDisplay').textContent =
                        `${formatDateShort(weekStartDate)} - ${formatDate(weekEnd)}`;
                } else if (currentView === 'year') {
                    document.getElementById('monthYearDisplay').textContent = `${currentYear}`;
                } else {
                    document.getElementById('monthYearDisplay').textContent =
                        `${monthNames[currentMonth]} ${currentYear}`;
                }
            }

            function navigate(delta) {
                if (currentView === 'month') {
                    const newDate = new Date(currentYear, currentMonth + delta, 1);
                    currentYear = newDate.getFullYear();
                    currentMonth = newDate.getMonth();
                    currentDate = new Date(currentYear, currentMonth, 1);
                } else if (currentView === 'week') {
                    weekStartDate = addWeeks(weekStartDate, delta);
                    currentDate = new Date(weekStartDate);
                    currentYear = currentDate.getFullYear();
                    currentMonth = currentDate.getMonth();
                } else if (currentView === 'day') {
                    currentDate = addDays(currentDate, delta);
                    currentYear = currentDate.getFullYear();
                    currentMonth = currentDate.getMonth();
                    currentDay = currentDate.getDate();
                } else if (currentView === 'year') {
                    currentYear += delta;
                }
                updateHeader();
                renderView();
            }

            function goToToday() {
                const now = new Date();
                currentDate = now;
                currentYear = now.getFullYear();
                currentMonth = now.getMonth();
                currentDay = now.getDate();
                weekStartDate = startOfWeek(now);
                updateHeader();
                renderView();
                if (datepicker) {
                    datepicker.selectDate(currentDate);
                }
            }

            let datepicker = null;

            function initDatepicker() {
                const input = document.getElementById('eventDateInput');

                datepicker = new AirDatepicker(input, {
                    locale: {
                        days: ['Sunday', 'Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday'],
                        daysShort: ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'],
                        daysMin: ['Su', 'Mo', 'Tu', 'We', 'Th', 'Fr', 'Sa'],
                        months: ['January', 'February', 'March', 'April', 'May', 'June', 'July', 'August', 'September',
                            'October', 'November', 'December'
                        ],
                        monthsShort: ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov',
                            'Dec'
                        ],
                        today: 'Today',
                        clear: 'Clear',
                        dateFormat: 'MM dd, yyyy',
                        timeFormat: 'hh:mm aa',
                        firstDay: 0
                    },
                    selectedDates: [currentDate],
                    onSelect: function({ date }) {
                        if (date) {
                            const d = new Date(date);
                            currentDate = d;
                            currentYear = d.getFullYear();
                            currentMonth = d.getMonth();
                            currentDay = d.getDate();
                            renderView();
                            updateHeader();
                        }
                    },
                    onRenderCell: function({ date, cellType }) {
                        if (cellType === 'day') {
                            const d = new Date(date);
                            const dayEvents = getEventsForDate(d);
                            if (dayEvents.length > 0) {
                                return {
                                    html: `<span class="air-datepicker-event-dot"></span>`
                                };
                            }
                        }
                    }
                });

                setTimeout(() => {
                    if (datepicker) {
                        datepicker.selectDate(currentDate);
                    }
                }, 100);
            }

            document.querySelectorAll('.view-toggle button').forEach(btn => {
                btn.addEventListener('click', function() {
                    switchView(this.dataset.view);
                });
            });

            document.getElementById('prevBtn').addEventListener('click', () => navigate(-1));
            document.getElementById('nextBtn').addEventListener('click', () => navigate(1));
            document.getElementById('todayBtn').addEventListener('click', goToToday);

            document.getElementById('addEventBtn').addEventListener('click', function() {
                const dateInput = document.getElementById('eventDateInput');
                const textInput = document.getElementById('eventTextInput');

                if (!dateInput.value) {
                    alert('Please select a date');
                    return;
                }
                if (!textInput.value.trim()) {
                    alert('Please enter an event name');
                    return;
                }

                const selectedDate = datepicker ? datepicker.selectedDates[0] : currentDate;
                const d = new Date(selectedDate);

                if (addEvent(d, textInput.value)) {
                    textInput.value = '';
                    if (datepicker) {
                        datepicker.update();
                    }
                }
            });

            document.getElementById('eventTextInput').addEventListener('keypress', function(e) {
                if (e.key === 'Enter') {
                    document.getElementById('addEventBtn').click();
                }
            });

            loadEvents();
            initDatepicker();
            switchView('day');
        })();
    </script>

</body>
</html>
